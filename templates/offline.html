<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    {% include 'pwa_head.html' %}
    <title>Offline - ChatFlick</title>
    <style>
        body {
            margin: 0;
            min-height: 100dvh;
            display: grid;
            place-items: center;
            background: #000;
            color: #fff;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            text-align: center;
        }

        main {
            width: min(88vw, 360px);
        }

        img {
            width: 86px;
            height: 86px;
            border-radius: 22px;
            background: #fff;
            padding: 10px;
        }

        h1 {
            margin: 22px 0 8px;
            font-size: 1.5rem;
        }

        p {
            margin: 0;
            color: rgba(255, 255, 255, 0.68);
            line-height: 1.5;
        }
    </style>
</head>

<body>
    <main>
        <img src="{{ url_for('static', filename='icons/icon-192.png') }}" alt="ChatFlick">
        <h1>You are offline</h1>
        <p>ChatFlick will reconnect automatically when your internet connection comes back.</p>
    </main>
</body>

</html>
